<!DOCTYPE html>
<html>
<head>
    <title>Lobby</title>
</head>
<body>

<h1>Room: {{ room }}</h1>

<h3 id="phase">Phase: {{ game.phase }}</h3>

<input id="name" placeholder="Name">
<button onclick="join()">Join</button>

<br><br>

<button onclick="act('gold')">💰 Gold</button>
<button onclick="act('rumor')">🕯 Rumor</button>
<button onclick="act('sabotage')">🗡 Sabotage</button>

<br><br>

<button onclick="next()">Next Phase</button>

<div id="players"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();
const room = "{{ room }}";

function join(){
    socket.emit("join", {
        room: room,
        name: document.getElementById("name").value
    });
}

function act(a){
    socket.emit("action", {
        room: room,
        name: document.getElementById("name").value,
        action: a
    });
}

function next(){
    socket.emit("next", {room});
}

socket.on("update", (g) => {

    document.getElementById("phase").innerText = "Phase: " + g.phase;

    let html = "";
    g.players.forEach(p => {
        html += `<p>${p.house.emoji} ${p.name} | 💰${p.gold} ⭐${p.influence} ⚖️${p.scandal}</p>`;
    });

    document.getElementById("players").innerHTML = html;
});
</script>

</body>
</html>
